        :root {
            --c1: #ff6b9d; --c2: #ffd93d; --c3: #6bcbf7; --c4: #a8e063;
            --shadow: 0 6px 0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background: #fffbf0;
            background-image: radial-gradient(circle at 20% 20%, #ffe4f0 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, #e4f4ff 0%, transparent 40%);
            min-height: 100vh;
            padding: 20px;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 10px 0 24px;
        }
        header h1 {
            font-size: clamp(26px, 6vw, 42px);
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d, #ff9a3c, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: none;
        }
        header p {
            font-size: 15px;
            color: #b5a4c0;
            margin-top: 6px;
        }

        .section-label {
            width: 100%;
            text-align: left;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ccc;
            padding: 10px 8px 4px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
            gap: 10px;
        }

        .group-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 4px 0;
        }

        .box {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 18px;
            font-size: 32px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            border: none;
        }
        .box.sheng {
            box-shadow: var(--shadow) #f4a0bd;
            border-top: 3px solid var(--c1);
            border-left: 3px solid var(--c1);
        }
        .box.yun {
            box-shadow: var(--shadow) #b5d96b;
            border-top: 3px solid #8ec63f;
            border-left: 3px solid #8ec63f;
        }
        .box.jie {
            box-shadow: var(--shadow) #7ab8d6;
            border-top: 3px solid var(--c3);
            border-left: 3px solid var(--c3);
        }
        .box:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #ddd !important;
        }
        .box::after {
            content: attr(data-hint);
            position: absolute;
            bottom: -18px;
            font-size: 9px;
            color: #bbb;
            font-weight: 700;
        }

        /* Popup */
        #pop {
            position: fixed;
            inset: 0;
            background: rgba(10, 5, 30, 0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            backdrop-filter: blur(6px);
        }
        #pop.show {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

        #pop-card {
            background: #fff;
            border-radius: 32px;
            padding: 30px 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 360px;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        #p-symbol {
            position: absolute;
            top: 16px;
            left: 22px;
            font-size: 26px;
            font-weight: 900;
            color: var(--c1);
        }

        #close-btn {
            position: absolute;
            top: 14px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f5f5f5;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        #close-btn:hover { background: #ffe0ed; }

        #p-emoji {
            font-size: 110px;
            line-height: 1.1;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        #p-emoji.bounce {
            animation: bounce 0.4s ease;
        }
        @keyframes bounce {
            0% { transform: scale(1); }
            40% { transform: scale(1.15); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        #p-word {
            font-size: 54px;
            font-weight: 900;
            color: #2d1b4e;
            letter-spacing: 3px;
            margin-top: 4px;
        }

        #p-pinyin {
            font-size: 14px;
            color: #aaa;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .pop-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .pop-btn {
            padding: 11px 22px;
            border-radius: 50px;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 0;
        }
        .pop-btn:active { transform: translateY(3px); box-shadow: 0 1px 0; }
        .btn-replay {
            background: var(--c2);
            color: #7a5a00;
            box-shadow-color: #c9a800;
            box-shadow: 0 4px 0 #c9a800;
        }
        .btn-next {
            background: var(--c1);
            color: #fff;
            box-shadow: 0 4px 0 #c04070;
        }

        .dot-row {
            display: flex;
            gap: 6px;
            margin-top: 14px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            transition: background 0.2s;
        }
        .dot.active { background: var(--c1); }

        .group-title {
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 4px;
            padding: 16px 0 6px;
            color: #c0b0cc;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(to right, transparent, #eee, transparent);
            margin: 8px auto;
        }
    </style>
</head>

const bopomofos = [
    {group:"聲母", chars:["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ"]},
    {group:"韻母", chars:["ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ"]},
    {group:"介母", chars:["ㄧ","ㄨ","ㄩ"]}
];

const boxColors = [
    "#ff6b9d","#ff9a3c","#ffd93d","#a8e063","#6bcbf7","#b48ce8","#ff8fab","#4ecdc4"
];

// ── State ──
let currentSymbol = '';
let currentWords = [];
let currentIndex = 0;
let currentUtterance = null;

function buildUI() {
    const main = document.getElementById('main');
    bopomofos.forEach(({group, chars}) => {
        const title = document.createElement('div');
        title.className = 'group-title';
        title.innerText = `— ${group} —`;
        main.appendChild(title);

        const row = document.createElement('div');
        row.className = 'group-row';
        chars.forEach((s, i) => {
            const box = document.createElement('button');
            box.className = 'box ' + (group === '聲母' ? 'sheng' : group === '韻母' ? 'yun' : 'jie');
            box.innerText = s;
            box.style.color = boxColors[i % boxColors.length];
            box.onclick = () => openPopup(s);
            row.appendChild(box);
        });
        main.appendChild(row);
    });
}

function openPopup(symbol) {
    currentSymbol = symbol;
    currentWords = [...library[symbol]].sort(() => Math.random() - 0.5); // shuffle
    currentIndex = 0;
    renderPopup();
    document.getElementById('pop').className = 'show';
}

function renderPopup() {
    const pick = currentWords[currentIndex];
    document.getElementById('p-symbol').innerText = currentSymbol;
    document.getElementById('p-word').innerText = pick.n;
    document.getElementById('p-pinyin').innerText = pick.p;

    const emojiEl = document.getElementById('p-emoji');
    emojiEl.innerText = pick.e;
    emojiEl.className = 'bounce';
    setTimeout(() => emojiEl.className = '', 500);

    // Dots
    const dotRow = document.getElementById('dot-row');
    dotRow.innerHTML = '';
    currentWords.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === currentIndex ? ' active' : '');
        dotRow.appendChild(dot);
    });

    speak(pick.n);
}

function nextWord() {
    currentIndex = (currentIndex + 1) % currentWords.length;
    renderPopup();
}

function replayAudio() {
    speak(currentWords[currentIndex].n);
}

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'zh-TW';
    msg.rate = 0.75;
    msg.pitch = 1.1;
    window.speechSynthesis.speak(msg);
}

function closePopup() {
    window.speechSynthesis.cancel();
    document.getElementById('pop').className = '';
}

// 點背景關閉
document.getElementById('pop').addEventListener('click', function(e) {
    if (e.target === this) closePopup();
});

// 鍵盤 Esc 關閉
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePopup();
});

buildUI();
</script>
