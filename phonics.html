        }

            top: 10px;
            background: white;
            border: none;
            border-radius: 14px;
            padding: 8px 12px;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 3px 10px rgba(0,0,0,0.10);
            touch-action: manipulation;
            transition: transform 0.1s;
            display: inline-flex;
            align-items: center;
        }
        #home-btn:active { transform: scale(0.90); }

        header h1 {
            font-size: clamp(26px, 6vw, 42px);
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d, #ff9a3c, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: none;

            color: #b5a4c0;
            margin-top: 6px;
        }

            width: 100%;
            text-align: left;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ccc;
            padding: 10px 8px 4px;
        }

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
            gap: 10px;
        }

        .group-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;

            width: 100%;

            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 18px;
            font-size: 32px;
            font-weight: 900;
            cursor: pointer;

            position: relative;
            border: none;

            border-top: 3px solid var(--c1);
            border-left: 3px solid var(--c1);

            border-top: 3px solid #8ec63f;
            border-left: 3px solid #8ec63f;

            border-top: 3px solid var(--c3);
            border-left: 3px solid var(--c3);

            box-shadow: 0 1px 0 #ddd !important;

        .box::after {
            content: attr(data-hint);
            position: absolute;
            bottom: -18px;
            font-size: 9px;
            color: #bbb;
            font-weight: 700;
        }

            inset: 0;
            background: rgba(10, 5, 30, 0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            backdrop-filter: blur(6px);
        }
        #pop.show {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

            border-radius: 32px;

            align-items: center;

            left: 22px;

            font-weight: 900;

            right: 16px;
            width: 36px;
            height: 36px;

            justify-content: center;

        }

            0% { transform: scale(1); }
            40% { transform: scale(1.15); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

            font-weight: 900;
            color: #2d1b4e;
            letter-spacing: 3px;

            font-weight: 900;

        .btn-next {

            color: #fff;

            gap: 6px;
            margin-top: 14px;
        }
        .dot {

            font-weight: 900;
            letter-spacing: 4px;

            color: #c0b0cc;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(to right, transparent, #eee, transparent);
            margin: 8px auto;

];

const boxColors = [
    "#ff6b9d","#ff9a3c","#ffd93d","#a8e063","#6bcbf7","#b48ce8","#ff8fab","#4ecdc4"
];

let currentSymbol = '';
let currentWords = [];
let currentIndex = 0;

function buildUI() {
    const main = document.getElementById('main');
    bopomofos.forEach(({group, chars}) => {
        const title = document.createElement('div');
        title.className = 'group-title';
        title.innerText = `вҖ” ${group} вҖ”`;
        main.appendChild(title);

        const row = document.createElement('div');
        row.className = 'group-row';
        chars.forEach((s, i) => {
            const box = document.createElement('button');
            box.className = 'box ' + (group === 'иҒІжҜҚ' ? 'sheng' : group === 'йҹ»жҜҚ' ? 'yun' : 'jie');
            box.innerText = s;
            box.style.color = boxColors[i % boxColors.length];
            box.onclick = () => openPopup(s);
            row.appendChild(box);
        });
        main.appendChild(row);
    });
}

function openPopup(symbol) {
    currentSymbol = symbol;
    currentWords = [...library[symbol]].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    renderPopup();
    document.getElementById('pop').className = 'show';
}

function renderPopup() {
    const pick = currentWords[currentIndex];
    document.getElementById('p-symbol').innerText = currentSymbol;
    document.getElementById('p-word').innerText = pick.n;
    document.getElementById('p-pinyin').innerText = pick.p;

    const emojiEl = document.getElementById('p-emoji');
    emojiEl.innerText = pick.e;
    emojiEl.className = 'bounce';
    setTimeout(() => emojiEl.className = '', 500);

    const dotRow = document.getElementById('dot-row');
    dotRow.innerHTML = '';
    currentWords.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === currentIndex ? ' active' : '');
        dotRow.appendChild(dot);
    });

    speak(pick.n);
}

function nextWord() {
    currentIndex = (currentIndex + 1) % currentWords.length;
    renderPopup();
}

function replayAudio() {
    speak(currentWords[currentIndex].n);
}

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'zh-TW';
    msg.rate = 0.75;
    msg.pitch = 1.1;
    window.speechSynthesis.speak(msg);
}

function closePopup() {
    window.speechSynthesis.cancel();
    document.getElementById('pop').className = '';
}

document.getElementById('pop').addEventListener('click', function(e) {
    if (e.target === this) closePopup();
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePopup();
});

buildUI();
