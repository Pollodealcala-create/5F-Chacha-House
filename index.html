<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注音純淨學習機 - 最終修正版</title>
    <style>
        :root { --bg: #fdfdfd; --accent: #ff7675; --btn-bg: #f7f1e3; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        h1 { color: #d63031; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 10px; width: 100%; max-width: 800px; }
        .btn { aspect-ratio: 1; background: var(--btn-bg); border: 3px solid #fab1a0; border-radius: 15px; box-shadow: 0 5px 0 #e17055; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: bold; transition: 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #e17055; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; }
        .card { background: white; padding: 30px; border-radius: 35px; text-align: center; width: 85%; max-width: 400px; border: 10px solid var(--accent); }
        .card-symbol { font-size: 5rem; color: var(--accent); display: block; margin-top: -10px; }
        .card-image { width: 180px; height: 180px; object-fit: contain; margin: 15px 0; border-radius: 20px; border: 2px solid #f1f2f6; }
        .card-word { font-size: 3rem; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<h1>ㄅㄆㄇ 純淨學習機 📢</h1>
<p>已手動校正發音，移除多餘疊音！</p>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="closeCard()">
    <div class="card" onclick="event.stopPropagation()">
        <span class="card-symbol" id="display-symbol"></span>
        <img src="" alt="圖片載入中..." class="card-image" id="display-image">
        <div class="card-word" id="display-word"></div>
        <p style="color:#aaa; font-size: 0.8rem; margin-top: 20px;">點擊畫面關閉</p>
    </div>
</div>

<script>
    // 手動校正表：避免電腦自動補完拼音
    const voiceCorrection = {
        "ㄅ": "玻", "ㄆ": "坡", "ㄇ": "摸", "ㄈ": "佛", "ㄉ": "得", "ㄊ": "特", "ㄋ": "呢", "ㄌ": "勒",
        "ㄍ": "哥", "ㄎ": "科", "ㄏ": "喝", "ㄐ": "基", "ㄑ": "欺", "ㄒ": "希", "ㄓ": "知", "ㄔ": "吃",
        "ㄕ": "師", "ㄖ": "日", "ㄗ": "資", "ㄘ": "雌", "ㄙ": "思", "ㄚ": "阿", "ㄛ": "喔", "ㄜ": "鵝",
        "ㄝ": "耶", "ㄞ": "哀", "ㄟ": "欸", "ㄠ": "熬", "ㄡ": "歐", "ㄢ": "安", "ㄣ": "恩", "ㄤ": "昂",
        "ㄥ": "亨", "ㄦ": "兒", "ㄧ": "一", "ㄨ": "屋", "ㄩ": "淤"
    };

    const data = {
        "ㄅ": { word: "蘿蔔", img: "https://img.icons8.com/color/400/carrot.png" },
        "ㄆ": { word: "皮球", img: "https://img.icons8.com/color/400/beach-ball.png" },
        "ㄇ": { word: "貓咪", img: "https://img.icons8.com/color/400/cat.png" },
        "ㄈ": { word: "飛機", img: "https://img.icons8.com/color/400/airplane-mode-on.png" },
        "ㄉ": { word: "大象", img: "https://img.icons8.com/color/400/elephant.png" },
        "ㄊ": { word: "兔子", img: "https://img.icons8.com/color/400/rabbit.png" },
        "ㄋ": { word: "牛奶", img: "https://img.icons8.com/color/400/milk-bottle.png" },
        "ㄌ": { word: "籃球", img: "https://img.icons8.com/color/400/basketball.png" },
        "ㄍ": { word: "西瓜", img: "https://img.icons8.com/color/400/watermelon.png" },
        "ㄎ": { word: "恐龍", img: "https://img.icons8.com/color/400/dinosaur.png" },
        "ㄏ": { word: "猴子", img: "https://img.icons8.com/color/400/monkey.png" },
        "ㄐ": { word: "雞蛋", img: "https://img.icons8.com/color/400/eggs.png" },
        "ㄑ": { word: "氣球", img: "https://img.icons8.com/color/400/balloons.png" },
        "ㄒ": { word: "洗澡", img: "https://img.icons8.com/color/400/bathtub.png" },
        "ㄓ": { word: "蜘蛛", img: "https://img.icons8.com/color/400/spider.png" },
        "ㄔ": { word: "車子", img: "https://img.icons8.com/color/400/car--v1.png" },
        "ㄕ": { word: "獅子", img: "https://img.icons8.com/color/400/lion.png" },
        "ㄖ": { word: "太陽", img: "https://img.icons8.com/color/400/sun--v1.png" },
        "ㄗ": { word: "走路", img: "https://img.icons8.com/color/400/walking--v1.png" },
        "ㄘ": { word: "草莓", img: "https://img.icons8.com/color/400/strawberry.png" },
        "ㄙ": { word: "松鼠", img: "https://img.icons8.com/color/400/squirrel.png" },
        "ㄚ": { word: "鴨子", img: "https://img.icons8.com/color/400/duck.png" },
        "ㄛ": { word: "公雞", img: "https://img.icons8.com/color/400/rooster.png" },
        "ㄜ": { word: "天鵝", img: "https://img.icons8.com/color/400/swan.png" },
        "ㄝ": { word: "葉子", img: "https://img.icons8.com/color/400/leaf.png" },
        "ㄞ": { word: "愛心", img: "https://img.icons8.com/color/400/like--v1.png" },
        "ㄟ": { word: "杯子", img: "https://img.icons8.com/color/400/cup.png" },
        "ㄠ": { word: "書包", img: "https://img.icons8.com/color/400/school-bag.png" },
        "ㄡ": { word: "小狗", img: "https://img.icons8.com/color/400/dog.png" },
        "ㄢ": { word: "雨傘", img: "https://img.icons8.com/color/400/umbrella.png" },
        "ㄣ": { word: "門鈴", img: "https://img.icons8.com/color/400/doorbell.png" },
        "ㄤ": { word: "冰箱", img: "https://img.icons8.com/color/400/fridge.png" },
        "ㄥ": { word: "紅燈", img: "https://img.icons8.com/color/400/traffic-light.png" },
        "ㄦ": { word: "耳朵", img: "https://img.icons8.com/color/400/ear.png" },
        "ㄧ": { word: "衣服", img: "https://img.icons8.com/color/400/t-shirt.png" },
        "ㄨ": { word: "屋子", img: "https://img.icons8.com/color/400/home.png" },
        "ㄩ": { word: "下雨", img: "https://img.icons8.com/color/400/rain.png" }
    };

    const synth = window.speechSynthesis;

    function speakCorrected(symbol, word) {
        synth.cancel();
        
        // 抓取手動校正後的發音文字
        const correctedSymbol = voiceCorrection[symbol] || symbol;

        const utterSymbol = new SpeechSynthesisUtterance(correctedSymbol);
        utterSymbol.lang = 'zh-TW';
        utterSymbol.rate = 0.7; 
        
        const utterWord = new SpeechSynthesisUtterance(word);
        utterWord.lang = 'zh-TW';
        utterWord.rate = 0.8;

        synth.speak(utterSymbol);
        synth.speak(utterWord);
    }

    function showCard(symbol) {
        const item = data[symbol];
        if(!item) return;

        document.getElementById('display-symbol').innerText = symbol;
        document.getElementById('display-image').src = item.img;
        document.getElementById('display-word').innerText = item.word;
        document.getElementById('overlay').style.display = 'flex';
        
        speakCorrected(symbol, item.word);
    }

    function closeCard() {
        document.getElementById('overlay').style.display = 'none';
        synth.cancel();
        document.getElementById('display-image').src = "";
    }

    Object.keys(data).forEach(s => {
        const div = document.createElement('div');
        div.className = 'btn';
        div.innerText = s;
        div.onclick = () => showCard(s);
        document.getElementById('grid').appendChild(div);
    });
</script>
</body>
</html>
