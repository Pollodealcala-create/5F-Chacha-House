<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ㄅㄆㄇ 圖像百科 🥇</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fdfdfd; margin: 0; padding: 20px; user-select: none; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 850px; margin: 0 auto; }
        .box { 
            width: 75px; height: 75px; line-height: 75px; 
            margin: 8px; background: #fff; border: 3px solid #ff7675; 
            border-radius: 15px; font-size: 35px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #fab1a0; transition: 0.1s;
        }
        .box:active { transform: translateY(3px); box-shadow: 0 1px 0 #fab1a0; }
        #pop { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); display: none; flex-direction: column; 
            align-items: center; justify-content: center; color: #fff; z-index: 999;
        }
        #p-img { width: 260px; height: 260px; margin: 20px; border-radius: 20px; background: white; padding: 15px; object-fit: contain; }
        #p-emoji { font-size: 160px; display: none; margin: 20px; }
        .word { font-size: 65px; font-weight: bold; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <h1 style="color:#d63031">ㄅㄆㄇ 圖像百科 🥇</h1>
    <p>全名詞發音校正完畢！這次絕對精確！</p>

    <div class="container" id="main"></div>

    <div id="pop" onclick="this.style.display='none'; window.speechSynthesis.cancel();">
        <div id="p-symbol" style="font-size: 40px; color: #ffadad; margin-bottom: 5px;"></div>
        <img id="p-img" src="" onerror="showEmojiBackup()">
        <div id="p-emoji"></div>
        <div id="p-word" class="word"></div>
        <p style="margin-top:20px; color:#ccc;">點擊畫面關閉</p>
    </div>

<script>
    var currentEmoji = "❓";
    
    var library = {
        "ㄅ": [{n:"蘿蔔",g:"carrot",e:"🥕"},{n:"爆米花",g:"popcorn",e:"🍿"},{n:"杯子",g:"cup",e:"🥛"}],
        "ㄆ": [{n:"皮球",g:"beach-ball",e:"⚽"},{n:"螃蟹",g:"crab",e:"🦀"},{n:"葡萄",g:"grapes",e:"🍇"}],
        "ㄇ": [{n:"貓咪",g:"cat",e:"🐱"},{n:"帽子",g:"winter-hat",e:"👒"},{n:"麵包",g:"bread",e:"🍞"}],
        "ㄈ": [{n:"飛機",g:"airplane",e:"✈️"},{n:"房子",g:"home",e:"🏠"},{n:"風扇",g:"fan",e:"🌀"}],
        "ㄉ": [{n:"大象",g:"elephant",e:"🐘"},{n:"蛋糕",g:"cake",e:"🎂"},{n:"燈泡",g:"light-bulb",e:"💡"}],
        "ㄊ": [{n:"兔子",g:"rabbit",e:"🐰"},{n:"糖果",g:"candy",e:"🍬"},{n:"太陽",g:"sun",e:"☀️"}],
        "ㄋ": [{n:"牛奶",g:"milk-bottle",e:"🥛"},{n:"鳥兒",g:"bird",e:"🐦"},{n:"檸檬",g:"lemon",e:"🍋"}],
        "ㄌ": [{n:"籃球",g:"basketball",e:"🏀"},{n:"老鼠",g:"mouse",e:"🐭"},{n:"辣椒",g:"chili-pepper",e:"🌶️"}],
        "ㄍ": [{n:"西瓜",g:"watermelon",e:"🍉"},{n:"公車",g:"bus",e:"🚌"},{n:"鋼琴",g:"piano",e:"🎹"}],
        "ㄎ": [{n:"恐龍",g:"dinosaur",e:"🦖"},{n:"口袋",g:"pocket",e:"👖"},{n:"筷子",g:"chopsticks",e:"🥢"}],
        "ㄏ": [{n:"猴子",g:"monkey",e:"🐒"},{n:"河馬",g:"hippopotamus",e:"🦛"},{n:"火車",g:"train",e:"🚂"}],
        "ㄐ": [{n:"雞蛋",g:"eggs",e:"🥚"},{n:"機器人",g:"robot",e:"🤖"},{n:"橘子",g:"orange",e:"🍊"}],
        "ㄑ": [{n:"氣球",g:"balloons",e:"🎈"},{n:"青蛙",g:"frog",e:"🐸"},{n:"汽車",g:"car",e:"🚗"}],
        "ㄒ": [{n:"香蕉",g:"banana",e:"🍌"},{n:"小鳥",g:"bird",e:"🐦"},{n:"洗澡盆",g:"bathtub",e:"🛁"}],
        "ㄓ": [{n:"時鐘",g:"clock",e:"⏰"},{n:"蜘蛛",g:"spider",e:"🕷️"},{n:"桌子",g:"table",e:"🪑"}],
        "ㄔ": [{n:"車子",g:"car",e:"🚗"},{n:"城堡",g:"castle",e:"🏰"},{n:"翅膀",g:"wings",e:"👼"}],
        "ㄕ": [{n:"獅子",g:"lion",e:"🦁"},{n:"手指",g:"hand",e:"🖐️"},{n:"書本",g:"book",e:"📖"}],
        "ㄖ": [{n:"熱狗",g:"hot-dog",e:"🌭"},{n:"日曆",g:"calendar",e:"📅"},{n:"肉乾",g:"steak",e:"🥩"}],
        "ㄗ": [{n:"橘子",g:"orange",e:"🍊"},{n:"自行車",g:"bicycle",e:"🚲"},{n:"粽子",g:"rice-dumplings",e:"🍙"}],
        "ㄘ": [{n:"草莓",g:"strawberry",e:"🍓"},{n:"彩虹",g:"rainbow",e:"🌈"},{n:"廁所",g:"toilet",e:"🚽"}],
        "ㄙ": [{n:"松鼠",g:"squirrel",e:"🐿️"},{n:"絲巾",g:"scarf",e:"🧣"},{n:"掃帚",g:"broom",e:"🧹"}],
        "ㄚ": [{n:"鴨子",g:"duck",e:"🦆"},{n:"牙刷",g:"toothbrush",e:"🪥"},{n:"沙發",g:"sofa",e:"🛋️"}],
        "ㄛ": [{n:"波浪",g:"water-wave",e:"🌊"},{n:"菠菜",g:"spinach",e:"🥬"},{n:"鳥窩",g:"bird-nest",e:"🪹"}],
        "ㄜ": [{n:"天鵝",g:"swan",e:"🦢"},{n:"可樂",g:"cola",e:"🥤"},{n:"惡魔",g:"devil",e:"😈"}],
        "ㄝ": [{n:"葉子",g:"leaf",e:"🍃"},{n:"椰子",g:"coconut",e:"🥥"},{n:"靴子",g:"boot",e:"🥾"}],
        "ㄞ": [{n:"白菜",g:"cabbage",e:"🥬"},{n:"大海",g:"sea-waves",e:"🌊"},{n:"奶瓶",g:"baby-bottle",e:"🍼"}],
        "ㄟ": [{n:"杯子",g:"cup",e:"🥛"},{n:"飛機",g:"airplane",e:"✈️"},{n:"貝殼",g:"seashell",e:"🐚"}],
        "ㄠ": [{n:"書包",g:"school-bag",e:"🎒"},{n:"貓咪",g:"cat",e:"🐱"},{n:"外套",g:"jacket",e:"🧥"}],
        "ㄡ": [{n:"小狗",g:"dog",e:"🐶"},{n:"蝸牛",g:"snail",e:"🐌"},{n:"皮球",g:"beach-ball",e:"⚽"}],
        "ㄢ": [{n:"雨傘",g:"umbrella",e:"☂️"},{n:"盤子",g:"plate",e:"🍽️"},{n:"雞蛋",g:"eggs",e:"🥚"}],
        "ㄣ": [{n:"門鈴",g:"doorbell",e:"🔔"},{n:"森林",g:"forest",e:"🌳"},{n:"輪胎",g:"wheel",e:"🛞"}],
        "ㄤ": [{n:"鋼琴",g:"piano",e:"🎹"},{n:"冰箱",g:"fridge",e:"🧊"},{n:"太陽",g:"sun",e:"☀️"}],
        "ㄥ": [{n:"時鐘",g:"clock",e:"⏰"},{n:"紅燈",g:"traffic-light",e:"🔴"},{n:"風箏",g:"kite",e:"🪁"}],
        "ㄦ": [{n:"耳朵",g:"ear",e:"👂"},{n:"兒子",g:"boy",e:"👦"},{n:"馬兒",g:"horse",e:"🐎"}],
        "ㄧ": [{n:"衣服",g:"t-shirt",e:"👕"},{n:"椅子",g:"chair",e:"🪑"},{n:"蜜蜂",g:"bee",e:"🐝"}],
        "ㄨ": [{n:"屋子",g:"home",e:"🏠"},{n:"烏龜",g:"turtle",e:"🐢"},{n:"玩具車",g:"toy-car",e:"🏎️"}],
        "ㄩ": [{n:"魚兒",g:"fish",e:"🐟"},{n:"玉米",g:"corn",e:"🌽"},{n:"羽毛",g:"feather",e:"🪶"}]
    };

    function showEmojiBackup() {
        document.getElementById('p-img').style.display = 'none';
        var em = document.getElementById('p-emoji');
        em.style.display = 'block';
        em.innerText = currentEmoji;
    }

    var bopomofos = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ","ㄧ","ㄨ","ㄩ"];
    var gBody = document.getElementById('main');

    window.onload = function() {
        bopomofos.forEach(function(s) {
            var box = document.createElement('div');
            box.className = 'box';
            box.innerText = s;
            box.onclick = function() {
                var choices = library[s];
                var pick = choices[Math.floor(Math.random() * choices.length)];
                
                currentEmoji = pick.e;
                document.getElementById('p-symbol').innerText = s;
                document.getElementById('p-word').innerText = pick.n;
                
                var img = document.getElementById('p-img');
                var em = document.getElementById('p-emoji');
                
                img.style.display = 'block';
                em.style.display = 'none';
                
                // 加時間戳記強制刷新
                img.src = "https://img.icons8.com/color/400/" + pick.g + ".png?t=" + new Date().getTime();
                
                document.getElementById('pop').style.display = 'flex';
                
                window.speechSynthesis.cancel();
                var msg = new SpeechSynthesisUtterance(pick.n);
                msg.lang = 'zh-TW'; msg.rate = 0.7;
                window.speechSynthesis.speak(msg);
                window.speechSynthesis.speak(msg);
            };
            gBody.appendChild(box);
        });
    };
</script>
</body>
</html>
