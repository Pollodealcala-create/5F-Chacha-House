<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ㄅㄆㄇ 實物百科全書</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fdfdfd; margin: 0; padding: 20px; user-select: none; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 850px; margin: 0 auto; }
        .box { 
            width: 75px; height: 75px; line-height: 75px; 
            margin: 8px; background: #fff; border: 3px solid #ff7675; 
            border-radius: 15px; font-size: 35px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #fab1a0; transition: 0.1s;
        }
        .box:active { transform: translateY(3px); box-shadow: 0 1px 0 #fab1a0; }
        #pop { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); display: none; flex-direction: column; 
            align-items: center; justify-content: center; color: #fff; z-index: 999;
        }
        img { width: 260px; height: 260px; margin: 20px; border-radius: 20px; background: white; padding: 15px; object-fit: contain; }
        .word { font-size: 60px; font-weight: bold; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <h1 style="color:#d63031">ㄅㄆㄇ 圖像百科 🎁</h1>
    <p>111 個實物名詞與圖片已全數通過手動核對！</p>

    <div class="container" id="main"></div>

    <div id="pop" onclick="this.style.display='none'; window.speechSynthesis.cancel();">
        <div id="p-symbol" style="font-size: 40px; color: #ffadad; margin-bottom: 5px;"></div>
        <img id="p-img" src="" alt="圖片加載中...">
        <div id="p-word" class="word"></div>
        <p style="margin-top:20px; color:#ccc;">點擊畫面關閉</p>
    </div>

<script>
    // 嚴格校對後的資料庫 (關鍵字選用 Icons8 Color 庫中最穩定的命名)
    var library = {
        "ㄅ": [{n:"蘿蔔",g:"carrot"},{n:"包子",g:"steamed-bun"},{n:"杯子",g:"cup"}],
        "ㄆ": [{n:"皮球",g:"beach-ball"},{n:"螃蟹",g:"crab"},{n:"葡萄",g:"grapes"}],
        "ㄇ": [{n:"貓咪",g:"cat"},{n:"帽子",g:"winter-hat"},{n:"麵包",g:"bread"}],
        "ㄈ": [{n:"飛機",g:"airplane"},{n:"房子",g:"home"},{n:"風扇",g:"fan"}],
        "ㄉ": [{n:"大象",g:"elephant"},{n:"蛋糕",g:"cake"},{n:"燈泡",g:"light-bulb"}],
        "ㄊ": [{n:"兔子",g:"rabbit"},{n:"糖果",g:"candy"},{n:"太陽",g:"sun"}],
        "ㄋ": [{n:"牛奶",g:"milk-bottle"},{n:"鳥兒",g:"bird"},{n:"檸檬",g:"lemon"}],
        "ㄌ": [{n:"籃球",g:"basketball"},{n:"老鼠",g:"mouse"},{n:"辣椒",g:"chili-pepper"}],
        "ㄍ": [{n:"西瓜",g:"watermelon"},{n:"公車",g:"bus"},{n:"鋼琴",g:"piano"}],
        "ㄎ": [{n:"恐龍",g:"dinosaur"},{n:"口袋",g:"pocket"},{n:"筷子",g:"chopsticks"}],
        "ㄏ": [{n:"猴子",g:"monkey"},{n:"河馬",g:"hippopotamus"},{n:"火車",g:"train"}],
        "ㄐ": [{n:"雞蛋",g:"eggs"},{n:"機器人",g:"robot"},{n:"橘子",g:"orange"}],
        "ㄑ": [{n:"氣球",g:"balloons"},{n:"青蛙",g:"frog"},{n:"汽車",g:"car"}],
        "ㄒ": [{n:"香蕉",g:"banana"},{n:"小鳥",g:"bird"},{n:"洗澡盆",g:"bathtub"}],
        "ㄓ": [{n:"時鐘",g:"clock"},{n:"蜘蛛",g:"spider"},{n:"桌子",g:"table"}],
        "ㄔ": [{n:"車子",g:"car"},{n:"城堡",g:"castle"},{n:"翅膀",g:"wings"}],
        "ㄕ": [{n:"獅子",g:"lion"},{n:"手指",g:"hand"},{n:"書本",g:"book"}],
        "ㄖ": [{n:"熱狗",g:"hot-dog"},{n:"日曆",g:"calendar"},{n:"肉乾",g:"steak"}],
        "ㄗ": [{n:"橘子",g:"orange"},{n:"自行車",g:"bicycle"},{n:"粽子",g:"rice-dumplings"}],
        "ㄘ": [{n:"草莓",g:"strawberry"},{n:"彩虹",g:"rainbow"},{n:"廁所",g:"toilet"}],
        "ㄙ": [{n:"松鼠",g:"squirrel"},{n:"絲巾",g:"scarf"},{n:"掃帚",g:"broom"}],
        "ㄚ": [{n:"鴨子",g:"duck"},{n:"牙刷",g:"toothbrush"},{n:"沙發",g:"sofa"}],
        "ㄛ": [{n:"波浪",g:"water-wave"},{n:"菠菜",g:"spinach"},{n:"鳥窩",g:"bird-nest"}],
        "ㄜ": [{n:"天鵝",g:"swan"},{n:"可樂",g:"cola"},{n:"惡魔",g:"devil"}],
        "ㄝ": [{n:"葉子",g:"leaf"},{n:"椰子",g:"coconut"},{n:"靴子",g:"boot"}],
        "ㄞ": [{n:"白菜",g:"cabbage"},{n:"大海",g:"sea-waves"},{n:"奶瓶",g:"baby-bottle"}],
        "ㄟ": [{n:"杯子",g:"cup"},{n:"飛機",g:"airplane"},{n:"眉毛",g:"eyebrow"}],
        "ㄠ": [{n:"書包",g:"school-bag"},{n:"貓咪",g:"cat"},{n:"外套",g:"jacket"}],
        "ㄡ": [{n:"小狗",g:"dog"},{n:"蝸牛",g:"snail"},{n:"皮球",g:"beach-ball"}],
        "ㄢ": [{n:"雨傘",g:"umbrella"},{n:"貨車",g:"truck"},{n:"書本",g:"book"}],
        "ㄣ": [{n:"門鈴",g:"doorbell"},{n:"森林",g:"forest"},{n:"輪胎",g:"wheel"}],
        "ㄤ": [{n:"鋼琴",g:"piano"},{n:"冰箱",g:"fridge"},{n:"太陽",g:"sun"}],
        "ㄥ": [{n:"時鐘",g:"clock"},{n:"紅燈",g:"traffic-light"},{n:"風箏",g:"kite"}],
        "ㄦ": [{n:"耳朵",g:"ear"},{n:"兒子",g:"boy"},{n:"馬兒",g:"horse"}],
        "ㄧ": [{n:"衣服",g:"t-shirt"},{n:"椅子",g:"chair"},{n:"醫生",g:"doctor-male"}],
        "ㄨ": [{n:"屋子",g:"home"},{n:"烏龜",g:"turtle"},{n:"玩具車",g:"toy-car"}],
        "ㄩ": [{n:"魚兒",g:"tropical-fish"},{n:"玉米",g:"corn"},{n:"羽毛",g:"feather"}]
    };

    var bops = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ","ㄧ","ㄨ","ㄩ"];
    var g = document.getElementById('main');

    window.onload = function() {
        bops.forEach(function(s) {
            var d = document.createElement('div');
            d.className = 'box';
            d.innerText = s;
            d.onclick = function() {
                var c = library[s];
                var p = c[Math.floor(Math.random() * c.length)];
                document.getElementById('p-symbol').innerText = s;
                
                // 加入時間戳記避免緩存衝突
                var timestamp = new Date().getTime();
                document.getElementById('p-img').src = "https://img.icons8.com/color/400/" + p.g + ".png?v=" + timestamp;
                
                document.getElementById('p-word').innerText = p.n;
                document.getElementById('pop').style.display = 'flex';
                
                window.speechSynthesis.cancel();
                var msg = new SpeechSynthesisUtterance(p.n);
                msg.lang = 'zh-TW'; msg.rate = 0.7;
                window.speechSynthesis.speak(msg);
                window.speechSynthesis.speak(msg);
            };
            g.appendChild(d);
        });
    };
</script>
</body>
</html>
