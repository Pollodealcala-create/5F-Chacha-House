<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注音學習機</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fafafa; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 800px; margin: 0 auto; }
        .box { 
            width: 70px; height: 70px; line-height: 70px; 
            margin: 5px; background: #fff; border: 2px solid #ff7675; 
            border-radius: 10px; font-size: 30px; font-weight: bold; cursor: pointer;
        }
        #pop { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; color: #fff;
        }
        img { width: 200px; height: 200px; margin: 20px; border-radius: 10px; }
        .word { font-size: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="color:#ff7675">ㄅㄆㄇ 學習機 🎁</h1>
    <p>點一下符號，聽兩次名字</p>

    <div class="container" id="main"></div>

    <div id="pop" onclick="this.style.display='none'; window.speechSynthesis.cancel();">
        <img id="p-img" src="">
        <div id="p-word" class="word"></div>
        <p>點擊畫面關閉</p>
    </div>

<script>
    // 這是最簡單的資料對照表
    var items = {
        "ㄅ": { n: "蘿蔔", g: "carrot" },
        "ㄆ": { n: "皮球", g: "beach-ball" },
        "ㄇ": { n: "貓咪", g: "cat" },
        "ㄈ": { n: "飛機", g: "airplane" },
        "ㄉ": { n: "大象", g: "elephant" },
        "ㄊ": { n: "兔子", g: "rabbit" },
        "ㄋ": { n: "牛奶", g: "milk-bottle" },
        "ㄌ": { n: "籃球", g: "basketball" },
        "ㄍ": { n: "西瓜", g: "watermelon" },
        "ㄎ": { n: "恐龍", g: "dinosaur" },
        "ㄏ": { n: "猴子", g: "monkey" },
        "ㄐ": { n: "雞蛋", g: "eggs" },
        "ㄑ": { n: "氣球", g: "balloons" },
        "ㄒ": { n: "洗澡", g: "bathtub" },
        "ㄓ": { n: "蜘蛛", g: "spider" },
        "ㄔ": { n: "車子", g: "car" },
        "ㄕ": { n: "獅子", g: "lion" },
        "ㄖ": { n: "太陽", g: "sun" },
        "ㄗ": { n: "走路", g: "walking" },
        "ㄘ": { n: "草莓", g: "strawberry" },
        "ㄙ": { n: "松鼠", g: "squirrel" },
        "ㄚ": { n: "鴨子", g: "duck" },
        "ㄛ": { n: "公雞", g: "rooster" },
        "ㄜ": { n: "天鵝", g: "swan" },
        "ㄝ": { n: "葉子", g: "leaf" },
        "ㄞ": { n: "愛心", g: "like" },
        "ㄟ": { n: "杯子", g: "cup" },
        "ㄠ": { n: "書包", g: "school-bag" },
        "ㄡ": { n: "小狗", g: "dog" },
        "ㄢ": { n: "雨傘", g: "umbrella" },
        "ㄣ": { n: "門鈴", g: "doorbell" },
        "ㄤ": { n: "冰箱", g: "fridge" },
        "ㄥ": { n: "紅燈", g: "traffic-light" },
        "ㄦ": { n: "耳朵", g: "ear" },
        "ㄧ": { n: "衣服", g: "t-shirt" },
        "ㄨ": { n: "屋子", g: "home" },
        "ㄩ": { n: "下雨", g: "rain" }
    };

    var list = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ","ㄧ","ㄨ","ㄩ"];
    
    var main = document.getElementById('main');

    list.forEach(function(s) {
        var div = document.createElement('div');
        div.className = 'box';
        div.innerText = s;
        div.onclick = function() {
            var target = items[s];
            document.getElementById('p-img').src = "https://img.icons8.com/color/400/" + target.g + ".png";
            document.getElementById('p-word').innerText = target.n;
            document.getElementById('pop').style.display = 'flex';
            
            // 語音：名詞唸兩遍
            window.speechSynthesis.cancel();
            var say = new SpeechSynthesisUtterance(target.n);
            say.lang = 'zh-TW';
            say.rate = 0.7;
            window.speechSynthesis.speak(say);
            window.speechSynthesis.speak(say);
        };
        main.appendChild(div);
    });
</script>
</body>
</html>
