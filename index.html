<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ㄅㄆㄇ 隨機圖像王</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fdfdfd; margin: 0; padding: 20px; user-select: none; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 800px; margin: 0 auto; }
        .box { 
            width: 70px; height: 70px; line-height: 70px; 
            margin: 8px; background: #fff; border: 3px solid #ff7675; 
            border-radius: 15px; font-size: 32px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #fab1a0; transition: 0.1s;
        }
        .box:active { transform: translateY(3px); box-shadow: 0 1px 0 #fab1a0; }
        #pop { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; color: #fff; z-index: 999;
        }
        img { width: 220px; height: 220px; margin: 20px; border-radius: 20px; background: white; padding: 15px; object-fit: contain; }
        .word { font-size: 55px; font-weight: bold; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1 style="color:#d63031">ㄅㄆㄇ 隨機圖像王 🎁</h1>
    <p>名詞修正：ㄛ 換成更精準的詞囉！</p>

    <div class="container" id="main"></div>

    <div id="pop" onclick="this.style.display='none'; window.speechSynthesis.cancel();">
        <div id="p-symbol" style="font-size: 40px; color: #ffadad;"></div>
        <img id="p-img" src="">
        <div id="p-word" class="word"></div>
        <p style="margin-top:30px; color:#ccc;">點擊畫面關閉</p>
    </div>

        "ㄑ": [{n:"氣球",g:"112672"},{n:"青蛙",g:"112687"},{n:"汽車",g:"113015"}],
        "ㄒ": [{n:"西瓜",g:"113023"},{n:"小鳥",g:"112672"},{n:"洗澡",g:"113707"}],
        "ㄓ": [{n:"蜘蛛",g:"112692"},{n:"桌子",g:"113708"},{n:"煮飯",g:"113709"}],
        "ㄔ": [{n:"車子",g:"113015"},{n:"吃飯",g:"113710"},{n:"翅膀",g:"113711"}],

        "ㄝ": [{n:"葉子",g:"113024"},{n:"爺爺",g:"113029"},{n:"椰子",g:"113720"}],

    };

    var bopomofos = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ","ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ","ㄧ","ㄨ","ㄩ"];
    var container = document.getElementById('main');

    window.onload = function() {
        bopomofos.forEach(function(s) {
            var div = document.createElement('div');
            div.className = 'box';
            div.innerText = s;
            div.onclick = function() {
                var choices = library[s];
                var pick = choices[Math.floor(Math.random() * choices.length)];
                document.getElementById('p-symbol').innerText = s;
                document.getElementById('p-img').src = "https://img.icons8.com/color/400/" + pick.g + ".png";
                document.getElementById('p-word').innerText = pick.n;
                document.getElementById('pop').style.display = 'flex';
                window.speechSynthesis.cancel();
                var msg = new SpeechSynthesisUtterance(pick.n);
                msg.lang = 'zh-TW'; msg.rate = 0.7;
                window.speechSynthesis.speak(msg);
                window.speechSynthesis.speak(msg);
            };
            container.appendChild(div);
        });
    };
</script>
</body>
</html>
