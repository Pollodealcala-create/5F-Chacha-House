<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注音隨機圖像學習機</title>
    <style>
        :root { --bg: #fdfdfd; --accent: #ff7675; --btn-bg: #f7f1e3; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        h1 { color: #d63031; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 10px; width: 100%; max-width: 800px; }
        .btn { aspect-ratio: 1; background: var(--btn-bg); border: 3px solid #fab1a0; border-radius: 15px; box-shadow: 0 5px 0 #e17055; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: bold; transition: 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #e17055; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; }
        .card { background: white; padding: 30px; border-radius: 35px; text-align: center; width: 85%; max-width: 400px; border: 10px solid var(--accent); }
        .card-symbol { font-size: 5rem; color: var(--accent); display: block; margin-top: -10px; }
        .card-image { width: 180px; height: 180px; object-fit: contain; margin: 15px 0; border-radius: 20px; border: 2px solid #f1f2f6; }
        .card-word { font-size: 3rem; color: #2c3e50; font-weight: bold; }
    </style>
</head>

        <div class="card-word" id="display-word"></div>
